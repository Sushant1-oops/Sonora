server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed static assets aggressively — Vite fingerprints filenames,
    # so a new deploy naturally gets new URLs and busts any stale cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any route not matching a real file goes to index.html
    # so React Router can handle client-side routes like /playlist/123
    location / {
        try_files $uri $uri/ /index.html;
    }
}
