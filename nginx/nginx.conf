













upstream api_backend {
    least_conn;
    server backend1:5000 max_fails=3 fail_timeout=30s;
    server backend2:5000 max_fails=3 fail_timeout=30s;
    server backend3:5000 max_fails=3 fail_timeout=30s;
}

upstream frontend_app {
    server frontend:80;
}




limit_req_zone $binary_remote_addr zone=gateway_limit:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    location /api/ {
        limit_req zone=gateway_limit burst=40 nodelay;

        proxy_pass http://api_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass_header Set-Cookie;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;


        proxy_next_upstream error timeout http_502 http_503;
    }


    location = /health {
        proxy_pass http://api_backend/health;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
